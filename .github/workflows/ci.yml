name: CI

on:
  push:
  pull_request:

jobs:
  macos_build:
    runs-on: macos-26

    steps:
      - name: Checkout source
        uses: actions/checkout@v7

      - name: Update Homebrew
        run: /bin/zsh -i -c "brew update"
        shell: bash
      
      - name: Update CMake
        run: /bin/zsh -i -c "brew upgrade cmake"
        shell: bash
      
      - name: Install LLVM
        run: /bin/zsh -i -c "brew install llvm"
        shell: bash
      
      - name: Install LLD
        run: /bin/zsh -i -c "brew install lld"
        shell: bash

      - name: CMake clang debug configuration
        run: /bin/zsh -i -c "cmake -B Build/Debug -S . -G Ninja -D CMAKE_BUILD_TYPE=Debug -D CMAKE_CXX_COMPILER=/opt/homebrew/opt/llvm/bin/clang++ -D CMAKE_LINKER=/opt/homebrew/opt/lld/bin/lld"
        shell: bash

      - name: CMake clang debug clear
        run: /bin/zsh -i -c "ninja clean_app -C Build/Debug"
        shell: bash
        
      - name: CMake clang debug compilation
        run: /bin/zsh -i -c "ninja -C Build/Debug"
        shell: bash
      
      - name: CMake clang release configuration
        run: /bin/zsh -i -c "cmake -B Build/Release -S . -G Ninja -D CMAKE_BUILD_TYPE=Release -D CMAKE_CXX_COMPILER=/opt/homebrew/opt/llvm/bin/clang++ -D CMAKE_LINKER=/opt/homebrew/opt/lld/bin/lld"
        shell: bash

      - name: CMake clang release clear
        run: /bin/zsh -i -c "ninja clean_app -C Build/Release"
        shell: bash
        
      - name: CMake clang release compilation
        run: /bin/zsh -i -c "ninja -C Build/Release"
        shell: bash

  windows_build:
    runs-on: windows-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v7

      - name: Setup MSVC environment
        uses: TheMrMilchmann/setup-msvc-dev@v4
        with:
          arch: x64

      - name: Install CMake
        run: Invoke-WebRequest -Uri "https://github.com/Kitware/CMake/releases/download/v4.3.4/cmake-4.3.4-windows-x86_64.zip" -OutFile cmake.zip
        shell: powershell
      
      - name: Extract CMake
        run: Expand-Archive cmake.zip -DestinationPath C:\CMake
        shell: powershell
      
      - name: Add CMake to PATH
        run: echo "C:\CMake\cmake-4.3.4-windows-x86_64\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
        shell: powershell

      - name: CMake MSVC debug configuration
        run: cmake -B Build/Debug -S . -G Ninja -D CMAKE_BUILD_TYPE=Debug -D CMAKE_CXX_COMPILER=cl -D CMAKE_LINKER=link
        shell: powershell

      - name: CMake MSVC debug clear
        run: ninja clean_app -C Build/Debug
        shell: powershell

      - name: Ninja MSVC debug compilation
        run: ninja -C Build/Debug
        shell: powershell
      
      - name: CMake MSVC release configuration
        run: cmake -B Build/Release -S . -G Ninja -D CMAKE_BUILD_TYPE=Release -D CMAKE_CXX_COMPILER=cl -D CMAKE_LINKER=link
        shell: powershell

      - name: CMake MSVC release clear
        run: ninja clean_app -C Build/Release
        shell: powershell

      - name: Ninja MSVC release compilation
        run: ninja -C Build/Release
        shell: powershell

  linux_build:
    runs-on: ubuntu-latest

    container:
      image: gcc:16

    steps:
      - name: Checkout source
        uses: actions/checkout@v7

      - name: Update APT
        run: apt-get update -y
        shell: bash

      - name: Upgrade APT
        run: apt-get full-upgrade -y
        shell: bash

      - name: Remove APT
        run: apt-get autoremove -y
        shell: bash
      
      - name: Clear APT
        run: apt-get autoclean -y
        shell: bash

      - name: Acquire CMake
        run: wget -O cmake.sh https://github.com/Kitware/CMake/releases/download/v4.3.4/cmake-4.3.4-linux-x86_64.sh
        shell: bash

      - name: Install privileges
        run: chmod +x cmake.sh
        shell: bash

      - name: Install CMake
        run: ./cmake.sh --skip-license --prefix=/usr/local
        shell: bash

      - name: Install Ninja
        run: apt-get install -y ninja-build
        shell: bash

      - name: Install Wayland
        run: apt-get install -y weston libwayland-dev wayland-protocols pkg-config
        shell: bash

      - name: Run Wayland
        run: |
          export XDG_RUNTIME_DIR=/tmp/xdg-runtime
          mkdir -p "$XDG_RUNTIME_DIR"
          chmod 700 "$XDG_RUNTIME_DIR"
          nohup weston --backend=headless-backend.so --idle-time=0 --socket=wayland-0 > /tmp/weston.log 2>&1 &
          timeout 10 bash -c '
            while [ ! -S "$XDG_RUNTIME_DIR/wayland-0" ]; do
              sleep 0.1
            done
          '
          echo "XDG_RUNTIME_DIR=$XDG_RUNTIME_DIR" >> "$GITHUB_ENV"
          echo "WAYLAND_DISPLAY=wayland-0" >> "$GITHUB_ENV"
      
      - name: CMake clang debug configuration
        run: cmake -B Build/Debug -S . -G Ninja -D CMAKE_BUILD_TYPE=Debug -D ALICE_CI=On
        shell: bash

      - name: CMake clang debug clear
        run: ninja clean_app -C Build/Debug
        shell: bash

      - name: Ninja clang debug compilation
        run: ninja -C Build/Debug
        shell: bash
      
      - name: CMake clang release configuration
        run: cmake -B Build/Release -S . -G Ninja -D CMAKE_BUILD_TYPE=Release -D ALICE_CI=On
        shell: bash

      - name: CMake clang release clear
        run: ninja clean_app -C Build/Release
        shell: bash

      - name: Ninja clang release compilation
        run: ninja -C Build/Release
        shell: bash